<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Roblox Outfit Viewer</title>
  <meta name="description" content="Roblox R15 3D outfit viewer for WebView integration." />
  <link rel="stylesheet" href="public/css/style.css" />
  <link rel="icon" type="image/x-icon" href="public/assets/icon.ico" />
  <link rel="apple-touch-icon" type="image/png" href="public/assets/icon.png" />


  <style>
    /* Viewer-only overrides */
    body,
    html {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0b0e11;
    }

    #viewer {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #canvasMount {
      width: 100%;
      height: 100%;
    }


    /* Error Overlay for Debugging */
    #error-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      color: #ff4d4d;
      padding: 20px;
      font-family: monospace;
      z-index: 9999;
      display: none;
      word-break: break-all;
      overflow-y: auto;
    }
  </style>

</head>

<body>
<div id="viewer">
  <div id="canvasMount"></div>




  <div id="error-overlay">
    <h3 style="margin-top:0">⚠️ WebGL / JS Error</h3>
    <div id="error-message"></div>
    <button onclick="this.parentElement.style.display='none'"
            style="margin-top:10px; padding:8px 16px; background:#fff; border:none; border-radius:4px; font-weight:bold; cursor:pointer">Close</button>
  </div>

</div>


<script>
  // Kiểm tra xem script có load được không
  window.addEventListener('load', () => {
    setTimeout(() => {
      if (!window.THREE) {
        window.showError("LỖI: app.js chưa được tải hoặc thực thi. Có thể do lỗi đường dẫn hoặc trình duyệt không hỗ trợ module.");
      }
    }, 1000);
  });
</script>
<script type="module" src="public/js/app.js" onload="console.log('app.js loaded')"
        onerror="window.showError('Không thể tải file public/js/app.js. Kiểm tra lại đường dẫn hoặc kết nối mạng.')">
</script>
</body>



</html>
